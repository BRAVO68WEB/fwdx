version: 2

project_name: fwdx

before:
  hooks:
    - go mod download

builds:
  - id: fwdx
    main: .
    binary: fwdx
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/BRAVO68WEB/fwdx/cmd/fwdx.version={{ .Version }}

archives:
  - id: binaries
    ids:
      - fwdx
    format: binary
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc

release:
  draft: false
  prerelease: auto

dockers:
  - ids:
      - fwdx
    goos: linux
    goarch: amd64
    use: buildx
    dockerfile: Dockerfile.goreleaser
    image_templates:
      - "{{ .Env.IMAGE_REPO }}:{{ .Tag }}-amd64"
      - "{{ .Env.IMAGE_REPO }}:latest-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.source=https://github.com/{{ .Env.GITHUB_REPOSITORY }}"
  - ids:
      - fwdx
    goos: linux
    goarch: arm64
    use: buildx
    dockerfile: Dockerfile.goreleaser
    image_templates:
      - "{{ .Env.IMAGE_REPO }}:{{ .Tag }}-arm64"
      - "{{ .Env.IMAGE_REPO }}:latest-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.source=https://github.com/{{ .Env.GITHUB_REPOSITORY }}"

docker_manifests:
  - name_template: "{{ .Env.IMAGE_REPO }}:{{ .Tag }}"
    image_templates:
      - "{{ .Env.IMAGE_REPO }}:{{ .Tag }}-amd64"
      - "{{ .Env.IMAGE_REPO }}:{{ .Tag }}-arm64"
  - name_template: "{{ .Env.IMAGE_REPO }}:latest"
    image_templates:
      - "{{ .Env.IMAGE_REPO }}:latest-amd64"
      - "{{ .Env.IMAGE_REPO }}:latest-arm64"
