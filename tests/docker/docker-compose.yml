services:
  mock-oidc:
    build:
      context: ../..
      dockerfile: tests/docker/Dockerfile.mockoidc
    environment:
      MOCK_OIDC_ISSUER: http://mock-oidc:8081
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8081/.well-known/openid-configuration || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 2s
    networks:
      e2e:
        ipv4_address: 172.28.0.5

  server:
    build:
      context: ../..
      dockerfile: tests/docker/Dockerfile.fwdx
    entrypoint: []
    command: ["/bin/sh", "/scripts/entrypoint-server.sh"]
    volumes:
      - ./scripts/entrypoint-server.sh:/scripts/entrypoint-server.sh:ro
    depends_on:
      mock-oidc:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null --header='Host: server' http://localhost:80/ || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 3s
    networks:
      e2e:
        ipv4_address: 172.28.0.2

  app:
    build:
      context: ./app
      dockerfile: ../Dockerfile.app
    expose:
      - "8080"
    networks:
      e2e:
        ipv4_address: 172.28.0.3

  client:
    build:
      context: ../..
      dockerfile: tests/docker/Dockerfile.fwdx
    entrypoint: []
    command: ["/bin/sh", "/scripts/entrypoint-client.sh"]
    volumes:
      - ./scripts/entrypoint-client.sh:/scripts/entrypoint-client.sh:ro
    environment:
      FWDX_SERVER: http://server
      FWDX_AGENT_NAME: e2e-agent
    depends_on:
      server:
        condition: service_healthy
      app:
        condition: service_started
      mock-oidc:
        condition: service_healthy
    networks:
      e2e:
        ipv4_address: 172.28.0.4

  tester:
    image: alpine:3.20
    command: ["/bin/sh", "-lc", "apk add --no-cache curl >/dev/null && while true; do sleep 3600; done"]
    depends_on:
      server:
        condition: service_healthy
      client:
        condition: service_started
    networks:
      e2e:
        ipv4_address: 172.28.0.10

networks:
  e2e:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
